    <section class="form-section">

        <label for="name">Name</label>

        />

        <label for="message">Send me a message:)</label>
        <textarea
          name="message"
          id="message"
          placeholder="Hi! How can i help you?"
          cols="30"
          rows="10"
        ></textarea>
